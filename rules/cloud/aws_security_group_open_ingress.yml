title: AWS Security Group Opened to the Internet
id: 32eda9e5-a838-4eb6-8278-b71ab53a9fc6
status: experimental
description: >
  Detects security group ingress rules authorizing 0.0.0.0/0, which can expose
  management ports or services directly to the Internet.
references:
  - https://attack.mitre.org/techniques/T1562/007/
author: Bvlik
date: 2026/06/21
logsource:
  product: aws
  service: cloudtrail
detection:
  selection:
    eventSource: 'ec2.amazonaws.com'
    eventName: 'AuthorizeSecurityGroupIngress'
    requestParameters|contains: '0.0.0.0/0'
  condition: selection
falsepositives:
  - Intentionally public services (load balancers, public web tiers)
level: medium
tags:
  - attack.defense-evasion
  - attack.t1562.007
