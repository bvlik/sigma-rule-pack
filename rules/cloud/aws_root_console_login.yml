title: AWS Root Account Console Login
id: 17ee3cbc-1222-4c12-9cbe-34be9f7e7d7b
status: experimental
description: >
  Detects an interactive console sign-in by the AWS account root user. Root should
  be reserved for break-glass; routine use is a strong policy violation and risk.
references:
  - https://docs.aws.amazon.com/IAM/latest/UserGuide/id_root-user.html
  - https://attack.mitre.org/techniques/T1078/004/
author: Bvlik
date: 2026/06/21
logsource:
  product: aws
  service: cloudtrail
detection:
  selection:
    eventName: 'ConsoleLogin'
    userIdentity.type: 'Root'
  filter_failed:
    responseElements.ConsoleLogin: 'Failure'
  condition: selection and not filter_failed
falsepositives:
  - Approved break-glass procedures (alert and verify regardless)
level: high
tags:
  - attack.initial-access
  - attack.t1078.004
