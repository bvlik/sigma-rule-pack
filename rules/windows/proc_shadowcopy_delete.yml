title: Volume Shadow Copy Deletion
id: 456ddfb9-4f6b-4b97-87bd-2b16e5835a93
status: experimental
description: >
  Detects deletion of Volume Shadow Copies via vssadmin or wmic, a hallmark of
  ransomware preventing recovery before encrypting files.
references:
  - https://attack.mitre.org/techniques/T1490/
author: Bvlik
date: 2026/06/21
logsource:
  product: windows
  category: process_creation
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains: 'shadowcopy delete'
  condition: 1 of selection_*
falsepositives:
  - Backup software pruning old shadow copies (should be allow-listed)
level: high
tags:
  - attack.impact
  - attack.t1490
