title: Encoded PowerShell Command
id: 3766240d-4f49-49b4-ac22-1f6340219764
status: experimental
description: >
  Detects PowerShell launched with a base64-encoded command, a common way to
  obfuscate payloads and evade simple command-line inspection.
references:
  - https://attack.mitre.org/techniques/T1059/001/
author: Bvlik
date: 2026/06/21
logsource:
  product: windows
  category: process_creation
detection:
  selection_img:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
  selection_enc:
    CommandLine|contains:
      - ' -enc '
      - ' -EncodedCommand '
      - ' -e '
  condition: all of selection_*
falsepositives:
  - Some management tooling legitimately uses encoded commands
level: medium
tags:
  - attack.execution
  - attack.t1059.001
