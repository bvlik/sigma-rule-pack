name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt ruff bandit pytest
      - name: Lint (ruff)
        run: ruff check .
        continue-on-error: true
      - name: Security scan (bandit)
        run: bandit -r src -ll
        continue-on-error: true
      - name: Compile
        run: python -m compileall -q src
      - name: Unit tests
        run: PYTHONPATH=src pytest -q
      - name: Validate Sigma rules
        run: PYTHONPATH=src python -m sigmalint rules/
      - name: Convert pack to Splunk (self-check)
        run: PYTHONPATH=src python -m sigmalint --convert splunk rules/ > /dev/null
      - name: Convert pack to Elastic (self-check)
        run: PYTHONPATH=src python -m sigmalint --convert elastic rules/ > /dev/null
